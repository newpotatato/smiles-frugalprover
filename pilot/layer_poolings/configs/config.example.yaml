# Example config for hidden-states dataset generation.
# Load this in the notebook instead of the hardcoded CONFIG dict.

# HuggingFace model id (loaded with AutoModel / AutoTokenizer)
model_name: "Qwen/Qwen2.5-0.5B"

# MATH benchmark source on the Hub + how many problems to sample
dataset_name: "EleutherAI/hendrycks_math"   # alt: "lighteval/MATH", "hendrycks/competition_math"
dataset_config: "algebra"                     # subject; null for datasets with no config
dataset_split: "test"
num_problems: 200
shuffle_seed: 42

# Text template applied to each MATH problem before encoding
prompt_template: "{problem}"

# layer indexes output_hidden_states:
#   0 = embedding output, 1..N = transformer block outputs (N = num_layers).
#   negative indices allowed (-1 = last layer).

# Pooled hidden-state vectors: collapse the token cloud into one (hidden_size,) vector.
# pooling: one of [mean, std, max, last, sum]
features:
  - {layer: 3,  pooling: max}
  - {layer: 5,  pooling: last}
  - {layer: -1, pooling: mean}

# Geometric features: scalars describing the shape/spread of the per-token hidden
# states (the "token cloud") at a layer.
# metric: one of
#   l2_norm          - norm of the mean-pooled vector (cloud center distance from origin)
#   mean_token_norm  - average length of the token vectors
#   token_norm_std   - std of the token vector lengths
#   anisotropy       - mean pairwise cosine similarity between tokens (directional spread)
#   effective_rank   - participation ratio of the cloud's singular spectrum (intrinsic dim)
geometry:
  - {layer: 3,  metric: l2_norm}
  - {layer: 5,  metric: mean_token_norm}
  - {layer: 5,  metric: anisotropy}
  - {layer: -1, metric: effective_rank}

# Runtime
batch_size: 8
max_input_tokens: 512     # input truncation length (NOT generation)
dtype: "float16"          # float16 | bfloat16 | float32
device: "cuda"            # cuda | cpu
output_path: "hidden_states_dataset.parquet"
